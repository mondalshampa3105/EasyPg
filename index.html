<!DOCTYPE html>
<html>
<head>
  <title>EasyPG</title>
  <link href="output.css" rel="stylesheet">
</head>

<body class="bg-gray-100">

  <!-- Navbar -->
  <div id="navbar"></div>

  <!-- Search Bar Section -->
<div class="pt-20 pb-6 px-5">
  <div class="max-w-3xl mx-auto">

    <div class="relative">
      <input 
        id="search"
        type="text" 
        placeholder="Search by city or area (e.g. Kolkata, Mumbai...)"
        class="w-full px-5 py-4 rounded-xl 
              border border-gray-300 bg-white 
              shadow-sm 
              focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-blue-400 
              transition duration-200"
      />
    </div>

  </div>
</div>
  <!-- Main Content -->
  <section 
    id="listings" 
    class="grid grid-cols-1 md:grid-cols-3 gap-6 p-6 mt-5 max-w-6xl mx-auto">
  </section>
  

  <!-- Footer -->
  <div id="footer"></div>

  <script src="layout.js"></script>
  <script src="data.js"></script>
  <script src="script.js"></script>

  <script>
    loadNavbar();
    loadFooter();
  </script>

</body>
</html>
