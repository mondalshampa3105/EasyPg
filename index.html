<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>EasyPG</title>
  <link href="output.css" rel="stylesheet">
</head>

<!-- 🔥 IMPORTANT: flex layout -->
<body class="bg-gray-100 flex flex-col min-h-screen">

  <!-- Navbar -->
  <div id="navbar"></div>

  <!-- 🔥 MAIN WRAPPER -->
  <main class="flex-grow">

    <!-- Search Bar -->
    <div class="pt-20 pb-6 px-5">
      <div class="max-w-3xl mx-auto">
        <input 
          id="search"
          type="text" 
          placeholder="Search by city or area (e.g. Kolkata, Mumbai...)"
          class="w-full px-5 py-4 rounded-xl 
                border border-gray-300 bg-white 
                shadow-sm 
                focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-blue-400 
                transition duration-200"
        />
      </div>
    </div>

    <!-- Listings -->
    <section 
      id="listings" 
      class="grid grid-cols-1 md:grid-cols-3 gap-6 p-6 max-w-6xl mx-auto">
    </section>

    <!-- 🔥 ADD THIS (pagination container) -->
    <div id="pagination" class="flex justify-center gap-2 mt-6 mb-10"></div>

  </main>

  <!-- Footer -->
  <div id="footer"></div>

  <script src="auth.js"></script>
  <script src="layout.js"></script>
  <script src="data.js"></script>
  <script src="script.js"></script>

  <script>
    loadNavbar();
    loadFooter();
  </script>

</body>
</html>
