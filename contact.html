<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Contact - EasyPG</title>
  <link href="output.css" rel="stylesheet">
</head>

<body class="bg-gray-100 flex flex-col min-h-screen">

  <!-- Navbar -->
  <div id="navbar"></div>

  <!-- Main -->
  <main class="flex-grow pt-24 px-4">

    <div class="max-w-5xl mx-auto grid md:grid-cols-2 gap-8">

      <!-- LEFT: Info -->
      <div class="bg-white p-6 rounded-xl shadow-md">
        <h2 class="text-2xl font-bold mb-4">Contact Us</h2>

        <p class="text-gray-600 mb-6">
          Have questions, feedback, or want to list your property?  
          Reach out to us — we’d love to help!
        </p>

        <div class="space-y-4 text-gray-700">

          <p>📍 Kolkata, India</p>
          <p>📞 +91 9876543210</p>
          <p>📧 support@easypg.com</p>

        </div>

        <div class="mt-6 text-sm text-gray-500">
          Available: Mon - Sat (9 AM - 7 PM)
        </div>
      </div>

      <!-- RIGHT: Form -->
      <div class="bg-white p-6 rounded-xl shadow-md">

        <h2 class="text-xl font-semibold mb-4">Send Message</h2>

        <form id="contactForm" class="space-y-4">

          <input 
            id="name"
            type="text"
            placeholder="Your Name"
            class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none"
          />

          <input 
            id="email"
            type="email"
            placeholder="Your Email"
            class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none"
          />

          <textarea 
            id="message"
            rows="4"
            placeholder="Your Message..."
            class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none"
          ></textarea>

          <button 
            type="submit"
            class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 transition"
          >
            Send Message
          </button>

          <p id="successMsg" class="text-green-600 text-sm hidden">
            Message sent successfully!
          </p>

        </form>

      </div>

    </div>

  </main>

  <!-- Footer -->
  <div id="footer"></div>

  <script src="layout.js"></script>

  <script>
    loadNavbar();
    loadFooter();

    // Simple form handler
    document.getElementById("contactForm").addEventListener("submit", function(e) {
      e.preventDefault();

      const name = document.getElementById("name").value;
      const email = document.getElementById("email").value;
      const message = document.getElementById("message").value;

      if (!name || !email || !message) {
        alert("Please fill all fields");
        return;
      }

      // 🔥 Store locally (for demo)
      const contacts = JSON.parse(localStorage.getItem("contacts")) || [];

      contacts.push({
        name,
        email,
        message,
        date: new Date().toLocaleString()
      });

      localStorage.setItem("contacts", JSON.stringify(contacts));

      document.getElementById("successMsg").classList.remove("hidden");

      this.reset();
    });
  </script>

</body>
</html>
