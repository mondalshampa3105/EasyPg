<!DOCTYPE html>
<html>
<head>
  <title>Login - EasyPG</title>
  <link href="output.css" rel="stylesheet">
</head>

<body class="bg-gray-100">

  <!-- Navbar -->
  <div id="navbar"></div>

  <!-- Main Wrapper -->
<div class="pt-24 min-h-screen flex flex-col items-center justify-center">

  <!-- Login Card -->
  <div class="bg-white shadow-xl rounded-2xl p-6 w-[350px] mt-10">

    <!-- Title -->
    <div class="text-center mb-5">
      <h1 class="text-2xl font-bold text-blue-600">EasyPG</h1>
      <p class="text-gray-500 text-sm">Login to continue</p>
    </div>

    <!-- Form -->
    <form id="loginForm" class="space-y-4">

      <div>
        <label class="block text-sm text-gray-600 mb-1">Email</label>
        <input 
          type="email" 
          id="email"
          placeholder="Enter email"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <div>
        <label class="block text-sm text-gray-600 mb-1">Password</label>
        <input 
          type="password" 
          id="password"
          placeholder="Enter password"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <button 
        type="submit"
        class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">
        Login
      </button>

    </form>

    <p class="text-sm text-gray-500 mt-4 text-center">
      Don’t have an account? 
      <span class="text-blue-600 cursor-pointer hover:underline">Sign up</span>
    </p>

  </div>

</div>

  <!-- Footer -->
  <div id="footer"></div>

  <script src="layout.js"></script>
  <script src="login.js"></script>

  <script>
    loadNavbar();
    loadFooter();
  </script>

</body>
</html>
